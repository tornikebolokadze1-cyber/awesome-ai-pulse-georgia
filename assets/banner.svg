<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <!-- Brand gradient: dark navy bg -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#172030"/>
    </linearGradient>
    <!-- Brand accent gradient: cyan to purple -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D0FF"/>
      <stop offset="100%" style="stop-color:#A949DA"/>
    </linearGradient>
    <linearGradient id="accent-rev" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A949DA"/>
      <stop offset="100%" style="stop-color:#00D0FF"/>
    </linearGradient>
    <linearGradient id="accent135" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D0FF"/>
      <stop offset="100%" style="stop-color:#A949DA"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00D0FF" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#A949DA" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern (matching site) -->
  <g opacity="0.06">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="900" y2="280" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#00CFFF" stroke-width="0.5"/>
  </g>

  <!-- Decorative glow circles -->
  <circle cx="760" cy="70" r="90" fill="none" stroke="#A949DA" stroke-width="1" opacity="0.12"/>
  <circle cx="760" cy="70" r="140" fill="none" stroke="#00D0FF" stroke-width="0.5" opacity="0.07"/>
  <circle cx="140" cy="270" r="70" fill="none" stroke="#A949DA" stroke-width="0.8" opacity="0.08"/>
  <circle cx="140" cy="270" r="110" fill="none" stroke="#00D0FF" stroke-width="0.4" opacity="0.05"/>

  <!-- Neural network nodes (cyan + purple) -->
  <g opacity="0.18">
    <circle cx="690" cy="80" r="4" fill="#00D0FF"/>
    <circle cx="740" cy="45" r="3" fill="#A949DA"/>
    <circle cx="800" cy="85" r="5" fill="#00D0FF"/>
    <circle cx="755" cy="120" r="3.5" fill="#A949DA"/>
    <circle cx="830" cy="55" r="4" fill="#00D0FF"/>
    <circle cx="850" cy="100" r="3" fill="#A949DA"/>
    <circle cx="710" cy="130" r="3" fill="#00D0FF"/>
    <line x1="690" y1="80" x2="740" y2="45" stroke="#00D0FF" stroke-width="0.6"/>
    <line x1="740" y1="45" x2="800" y2="85" stroke="#A949DA" stroke-width="0.6"/>
    <line x1="800" y1="85" x2="755" y2="120" stroke="#00D0FF" stroke-width="0.6"/>
    <line x1="740" y1="45" x2="830" y2="55" stroke="#A949DA" stroke-width="0.6"/>
    <line x1="690" y1="80" x2="755" y2="120" stroke="#00D0FF" stroke-width="0.6"/>
    <line x1="830" y1="55" x2="850" y2="100" stroke="#A949DA" stroke-width="0.6"/>
    <line x1="800" y1="85" x2="850" y2="100" stroke="#00D0FF" stroke-width="0.6"/>
    <line x1="755" y1="120" x2="710" y2="130" stroke="#A949DA" stroke-width="0.6"/>
  </g>

  <!-- Pulse line (brand signature element) -->
  <g transform="translate(55, 85)" filter="glow-cyan">
    <polyline points="0,45 25,45 35,12 48,78 60,30 72,55 90,45 110,45" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main title: AI PULSE -->
  <text x="180" y="118" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="50" font-weight="800" fill="url(#accent)" filter="text-shadow" letter-spacing="2">
    AI PULSE
  </text>
  <!-- GEORGIA -->
  <text x="180" y="172" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="50" font-weight="800" fill="#FAFAFA" filter="text-shadow" letter-spacing="3">
    GEORGIA
  </text>

  <!-- Tagline -->
  <text x="180" y="208" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#B3B3B3" letter-spacing="0.5">
    AI აგენტების, ინსტრუმენტებისა და ავტომატიზაციის კურირებული კოლექცია
  </text>

  <!-- Accent line under tagline -->
  <rect x="180" y="220" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Bottom bar -->
  <rect x="0" y="260" width="900" height="60" fill="#111827" fill-opacity="0.7" rx="0"/>
  <rect x="0" y="260" width="900" height="1" fill="url(#accent)" opacity="0.2"/>

  <!-- Bottom stats -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13">
    <!-- Repos -->
    <text x="80" y="296" text-anchor="middle">
      <tspan fill="#00D0FF" font-weight="700" font-size="20">102</tspan>
      <tspan dx="6" fill="#B3B3B3">რეპო</tspan>
    </text>
    <!-- Categories -->
    <text x="220" y="296" text-anchor="middle">
      <tspan fill="#A949DA" font-weight="700" font-size="20">9</tspan>
      <tspan dx="6" fill="#B3B3B3">კატეგორია</tspan>
    </text>
    <!-- Tags -->
    <g transform="translate(380, 283)">
      <rect x="0" y="0" width="80" height="24" rx="12" fill="rgba(0,208,255,0.15)" stroke="#00D0FF" stroke-width="0.5"/>
      <text x="40" y="16" text-anchor="middle" fill="#00D0FF" font-size="11" font-weight="600">AI Agents</text>
    </g>
    <g transform="translate(470, 283)">
      <rect x="0" y="0" width="55" height="24" rx="12" fill="rgba(169,73,218,0.15)" stroke="#A949DA" stroke-width="0.5"/>
      <text x="27.5" y="16" text-anchor="middle" fill="#A949DA" font-size="11" font-weight="600">MCP</text>
    </g>
    <g transform="translate(535, 283)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="rgba(0,208,255,0.15)" stroke="#00D0FF" stroke-width="0.5"/>
      <text x="50" y="16" text-anchor="middle" fill="#00D0FF" font-size="11" font-weight="600">Claude Code</text>
    </g>
    <!-- Brand -->
    <text x="780" y="296" text-anchor="middle" fill="#B3B3B3" font-size="12">
      <tspan fill="#00D0FF">&#9733;</tspan>
      <tspan dx="4" fill="#FAFAFA" font-weight="600">aipulsegeorgia.ge</tspan>
    </text>
  </g>
</svg>
