<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1120;color:#E2E8F0;font-family:'Inter','Segoe UI',system-ui,sans-serif;overflow:hidden}

/* ─── HEADER ─── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:20;height:48px;
  background:rgba(11,17,32,0.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(99,102,241,0.12);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.hdr-title{font-size:15px;font-weight:600;color:#818CF8}
.hdr-right{display:flex;align-items:center;gap:14px}
.hdr-stats{font-size:11px;color:#475569}
.hdr-stats b{color:#818CF8}
#search{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;padding:5px 10px;color:#E2E8F0;font-size:11px;width:160px;outline:0}
#search:focus{border-color:#818CF8;background:rgba(129,140,248,0.06)}
#search::placeholder{color:#334155}

/* ─── TOOLTIP ─── */
#tip{position:fixed;z-index:30;pointer-events:none;opacity:0;
  background:rgba(15,23,42,0.97);border:1px solid rgba(129,140,248,0.2);
  border-radius:12px;padding:16px 20px;max-width:320px;min-width:200px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);transition:opacity .12s}
#tip.show{opacity:1}
#tip .tp-name{font-size:14px;font-weight:700;color:#C7D2FE}
#tip .tp-stars{font-size:18px;font-weight:800;color:#818CF8;margin-top:4px}
#tip .tp-cat{display:inline-block;font-size:9px;color:#64748B;margin-top:4px;
  padding:2px 8px;border-radius:10px;border:1px solid rgba(100,116,139,0.2)}
#tip .tp-desc{font-size:11px;color:#94A3B8;margin-top:10px;line-height:1.6}

/* ─── LEGEND ─── */
#legend{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;gap:6px;padding:6px 12px;
  background:rgba(11,17,32,0.9);backdrop-filter:blur(12px);
  border:1px solid rgba(99,102,241,0.1);border-radius:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#475569;
  cursor:pointer;padding:3px 8px;border-radius:6px;transition:all .15s;user-select:none}
.leg:hover,.leg.on{background:rgba(129,140,248,0.1);color:#C7D2FE}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* ─── SVG ─── */
svg{display:block}
.cat-zone{rx:16;ry:16;fill:rgba(255,255,255,0.015);stroke-width:1}
.cat-title{font-size:11px;font-weight:700;letter-spacing:0.3px}
.cat-count{font-size:9px;fill:#334155}
.repo-circle{cursor:pointer;transition:opacity .15s,r .15s}
.repo-circle:hover{filter:brightness(1.3)}
.repo-label{font-size:7.5px;fill:#475569;pointer-events:none;text-anchor:middle}
.cross-link{fill:none;stroke-opacity:0.04;stroke-width:0.8}
.repo-circle.dim{opacity:0.05}
.repo-label.dim{opacity:0}
.cross-link.dim{stroke-opacity:0.005}
.repo-circle.glow{filter:url(#gl)}
</style>

// ═══════════════════════════════════════
//  LAYOUT: 3x3 grid, fixed positions
// ═══════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const pad = 16;
const top0 = 56;
const cellW = (W - pad*4) / 3;
const cellH = (H - top0 - pad*4 - 40) / 3;

// Grid positions for 9 categories
const gridPos = [
  {col:0,row:0},{col:1,row:0},{col:2,row:0},
  {col:0,row:1},{col:1,row:1},{col:2,row:1},
  {col:0,row:2},{col:1,row:2},{col:2,row:2}
];
const catZones = {};
cats.forEach((cat, i) => {
  const gp = gridPos[i];
  catZones[cat.k] = {
    x: pad*2 + gp.col * (cellW + pad),
    y: top0 + pad + gp.row * (cellH + pad),
    w: cellW, h: cellH,
    cx: pad*2 + gp.col*(cellW+pad) + cellW/2,
    cy: top0 + pad + gp.row*(cellH+pad) + cellH/2
  };
});

// Place nodes in their category zone using packed layout
const grouped = {};
cats.forEach(c => grouped[c.k] = nodes.filter(n => n.c === c.k));

const rScale = d3.scaleSqrt().domain([0, d3.max(nodes, d=>d.s)]).range([3, 28]);

// Pack nodes within each zone
Object.entries(grouped).forEach(([k, arr]) => {
  const zone = catZones[k];
  // Sort by stars descending
  arr.sort((a,b) => b.s - a.s);
  // Use D3 pack simulation within zone
  const packSim = d3.forceSimulation(arr)
    .force("x", d3.forceX(zone.cx).strength(0.8))
    .force("y", d3.forceY(zone.cy + 10).strength(0.8))
    .force("collide", d3.forceCollide(d => rScale(d.s) + 2.5).strength(1))
    .stop();
  for(let i = 0; i < 120; i++) packSim.tick();
  // Clamp to zone bounds
  arr.forEach(d => {
    const r = rScale(d.s);
    d.x = Math.max(zone.x + r + 4, Math.min(zone.x + zone.w - r - 4, d.x));
    d.y = Math.max(zone.y + r + 20, Math.min(zone.y + zone.h - r - 4, d.y));
  });
});

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
const svg = d3.select("#viz").attr("width",W).attr("height",H);
const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.5,3]).on("zoom",e=>g.attr("transform",e.transform)));

// Category zones
cats.forEach(cat => {
  const z = catZones[cat.k];
  g.append("rect").attr("class","cat-zone")
    .attr("x",z.x).attr("y",z.y).attr("width",z.w).attr("height",z.h)
    .attr("stroke",cat.c).attr("stroke-opacity",0.12);
  g.append("text").attr("class","cat-title")
    .attr("x",z.x+10).attr("y",z.y+16)
    .attr("fill",cat.c)
    .text(cat.e+" "+cat.l);
  const count = grouped[cat.k].length;
  g.append("text").attr("class","cat-count")
    .attr("x",z.x+z.w-8).attr("y",z.y+16)
    .attr("text-anchor","end")
    .text(count+" repos");
});

// Cross-category links (curved)
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const linkG = g.append("g").selectAll("path").data(links.filter(l=>nodeMap[l.source]&&nodeMap[l.target])).join("path")
  .attr("class","cross-link")
  .attr("stroke", d => catMap[nodeMap[d.source].c].c)
  .attr("d", d => {
    const s=nodeMap[d.source], t=nodeMap[d.target];
    if(!s||!t) return "";
    const mx=(s.x+t.x)/2, my=(s.y+t.y)/2-20;
    return `M${s.x},${s.y}Q${mx},${my},${t.x},${t.y}`;
  });

// Nodes
const nodeG = g.append("g").selectAll("g").data(nodes).join("g")
  .attr("transform",d=>`translate(${d.x},${d.y})`);

nodeG.append("circle").attr("class","repo-circle")
  .attr("r",d=>rScale(d.s))
  .attr("fill",d=>catMap[d.c].c)
  .attr("fill-opacity",0.6)
  .attr("stroke",d=>catMap[d.c].c)
  .attr("stroke-opacity",0.3)
  .attr("stroke-width",1);

// Labels only for repos with enough space (>15K stars)
nodeG.filter(d => d.s >= 15000).append("text").attr("class","repo-label")
  .attr("dy", d => rScale(d.s) + 10)
  .text(d => d.n.length > 14 ? d.n.slice(0,12)+".." : d.n);

// ═══════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════
const tip = d3.select("#tip");
function fmtS(s){return s>=1e3?(s/1e3).toFixed(s>=1e4?0:1)+"K":s}

nodeG.on("mouseenter",(e,d)=>{
  tip.select(".tp-name").text(d.n);
  tip.select(".tp-stars").text("⭐ "+fmtS(d.s));
  tip.select(".tp-cat").text(catMap[d.c].e+" "+catMap[d.c].l);
  tip.select(".tp-desc").text(d.d);
  tip.classed("show",true);
  // Highlight
  const conn=new Set([d.id]);
  links.forEach(l=>{if(l.source===d.id||l.source.id===d.id)conn.add(typeof l.target==="object"?l.target.id:l.target);
    if(l.target===d.id||l.target.id===d.id)conn.add(typeof l.source==="object"?l.source.id:l.source);});
  d3.selectAll(".repo-circle").classed("dim",n=>!conn.has(n.id)).classed("glow",n=>n.id===d.id);
  d3.selectAll(".repo-label").classed("dim",n=>!conn.has(n.id));
  linkG.classed("dim",l=>{
    const si=typeof l.source==="object"?l.source:l.source;
    const ti=typeof l.target==="object"?l.target:l.target;
    return si!==d.id&&ti!==d.id;
  }).filter(l=>{
    const si=typeof l.source==="object"?l.source:l.source;
    const ti=typeof l.target==="object"?l.target:l.target;
    return si===d.id||ti===d.id;
  }).attr("stroke-opacity",0.3);
}).on("mousemove",(e)=>{
  let x=e.clientX+14,y=e.clientY-8;
  if(x+330>W)x=e.clientX-340;
  if(y+180>H)y=e.clientY-190;
  tip.style("left",x+"px").style("top",y+"px");
}).on("mouseleave",()=>{
  tip.classed("show",false);
  d3.selectAll(".repo-circle").classed("dim",false).classed("glow",false);
  d3.selectAll(".repo-label").classed("dim",false);
  linkG.classed("dim",false).attr("stroke-opacity",0.04);
});

// Search
d3.select("#search").on("input",function(){
  const q=this.value.toLowerCase();
  if(!q){d3.selectAll(".repo-circle").classed("dim",false);d3.selectAll(".repo-label").classed("dim",false);return}
  d3.selectAll(".repo-circle").classed("dim",n=>!n.n.toLowerCase().includes(q)&&!n.d.toLowerCase().includes(q));
  d3.selectAll(".repo-label").classed("dim",n=>!n.n.toLowerCase().includes(q)&&!n.d.toLowerCase().includes(q));
});

// Legend
const leg=d3.select("#legend");
cats.forEach(cat=>{
  const el=leg.append("div").attr("class","leg").attr("data-k",cat.k);
  el.append("div").attr("class","leg-dot").style("background",cat.c);
  el.append("span").text(cat.l);
  el.on("click",function(){
    const on=d3.select(this).classed("on");
    d3.selectAll(".leg").classed("on",false);
    if(!on){
      d3.select(this).classed("on",true);
      d3.selectAll(".repo-circle").classed("dim",n=>n.c!==cat.k);
      d3.selectAll(".repo-label").classed("dim",n=>n.c!==cat.k);
      linkG.classed("dim",true);
    } else {
      d3.selectAll(".repo-circle").classed("dim",false);
      d3.selectAll(".repo-label").classed("dim",false);
      linkG.classed("dim",false);
    }
  });
});

// Resize
window.addEventListener("resize",()=>location.reload());
</script>
