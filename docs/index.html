  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: #aaa;
    cursor: pointer; padding: 3px 10px;
    border-radius: 12px; border: 1px solid transparent;
    transition: all 0.2s;
  }
  .legend-item:hover, .legend-item.active {
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* Tooltip */
  #tooltip {
    position: fixed; z-index: 20;
    background: rgba(17,24,39,0.96);
    border: 1px solid rgba(0,208,255,0.3);
    border-radius: 10px; padding: 14px 18px;
    max-width: 360px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);

  #tooltip .name { font-size: 16px; font-weight: 700; color: #00D0FF; }
  #tooltip .stars { font-size: 13px; color: #A949DA; margin-top: 4px; }
  #tooltip .cat { font-size: 11px; color: #888; margin-top: 2px; }
  #tooltip .desc { font-size: 12px; color: #ccc; margin-top: 8px; line-height: 1.5; }

  #search {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 6px 12px;
    color: #fafafa; font-size: 13px; width: 200px;
    outline: none;
  }
  #search:focus { border-color: #00D0FF; }
  #search::placeholder { color: #666; }

  /* Canvas */
  svg { display: block; }
  .link { stroke-opacity: 0.12; }
  .link:hover { stroke-opacity: 0.5; }
  .node-circle {
    stroke-width: 1.5; cursor: pointer;
    transition: r 0.2s;
  }
  .node-label {
    font-size: 9px; fill: #aaa;
    pointer-events: none; text-anchor: middle;
  }
  .node-circle.dimmed { opacity: 0.08; }
  .node-label.dimmed { opacity: 0.05; }
  .link.dimmed { stroke-opacity: 0.02; }

// ─── D3 SETUP ───
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#graph").attr("width", width).attr("height", height);
const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.2, 5]).on("zoom", (e) => g.attr("transform", e.transform)));

// Scale: node radius by stars
const rScale = d3.scaleSqrt()
  .domain([0, d3.max(nodes, d => d.stars)])
  .range([5, 42]);

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(100).strength(0.3))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => rScale(d.stars) + 4));

// Links
const link = g.append("g").selectAll("line")
  .data(links).join("line")
  .attr("class", "link")
  .attr("stroke", d => {
    const sc = categories[nodes.find(n=>n.id===d.source.id||n.id===d.source)?.cat]?.color || "#444";
    return sc;
  })
  .attr("stroke-width", 1);

// Nodes
const node = g.append("g").selectAll("g")
  .data(nodes).join("g")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end", (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

node.append("circle")
  .attr("class", "node-circle")
  .attr("r", d => rScale(d.stars))
  .attr("fill", d => categories[d.cat].color)
  .attr("fill-opacity", 0.7)
  .attr("stroke", d => categories[d.cat].color);

node.append("text")
  .attr("class", "node-label")
  .attr("dy", d => rScale(d.stars) + 12)
  .text(d => d.name);

// Tooltip
const tooltip = d3.select("#tooltip");
node.on("mouseenter", (e, d) => {
  tooltip.select(".name").text(d.name);
  tooltip.select(".stars").text(`⭐ ${d.stars >= 1000 ? (d.stars/1000).toFixed(d.stars>=10000?0:1)+"K" : d.stars}`);
  tooltip.select(".cat").text(categories[d.cat].label);
  tooltip.select(".desc").text(d.desc);
  tooltip.classed("visible", true);

  // Highlight connected
  const connected = new Set();
  connected.add(d.id);
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if(sid === d.id) connected.add(tid);
    if(tid === d.id) connected.add(sid);
  });
  d3.selectAll(".node-circle").classed("dimmed", n => !connected.has(n.id));
  d3.selectAll(".node-label").classed("dimmed", n => !connected.has(n.id));
  link.classed("dimmed", l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    return sid !== d.id && tid !== d.id;
  });
}).on("mousemove", (e) => {
  tooltip.style("left", (e.clientX + 16) + "px").style("top", (e.clientY - 10) + "px");
}).on("mouseleave", () => {
  tooltip.classed("visible", false);
  d3.selectAll(".node-circle").classed("dimmed", false);
  d3.selectAll(".node-label").classed("dimmed", false);
  link.classed("dimmed", false);
});

// Click → open GitHub
node.on("click", (e, d) => {
  // Find URL from README data (simplified)
});

// Tick
simulation.on("tick", () => {
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ─── LEGEND ───
const legend = d3.select("#legend");
Object.entries(categories).forEach(([key, val]) => {
  const item = legend.append("div").attr("class","legend-item").attr("data-cat", key);
  item.append("div").attr("class","legend-dot").style("background", val.color);
  item.append("span").text(val.label);
  item.on("click", function() {
    const active = d3.select(this).classed("active");
    d3.selectAll(".legend-item").classed("active", false);
    if (!active) {
      d3.select(this).classed("active", true);
      d3.selectAll(".node-circle").classed("dimmed", n => n.cat !== key);
      d3.selectAll(".node-label").classed("dimmed", n => n.cat !== key);
      link.classed("dimmed", true);
    } else {
      d3.selectAll(".node-circle").classed("dimmed", false);
      d3.selectAll(".node-label").classed("dimmed", false);
      link.classed("dimmed", false);
    }
  });
});

// ─── SEARCH ───
d3.select("#search").on("input", function() {
  const q = this.value.toLowerCase();
  if (!q) {
    d3.selectAll(".node-circle").classed("dimmed", false);
    d3.selectAll(".node-label").classed("dimmed", false);
    link.classed("dimmed", false);
    return;
  }
  d3.selectAll(".node-circle").classed("dimmed", n => !n.name.toLowerCase().includes(q));
  d3.selectAll(".node-label").classed("dimmed", n => !n.name.toLowerCase().includes(q));
  link.classed("dimmed", true);
});

// Resize
window.addEventListener("resize", () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr("width", w).attr("height", h);
  simulation.force("center", d3.forceCenter(w/2, h/2)).alpha(0.3).restart();
});
