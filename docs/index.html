* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0f1a; color:#fafafa; overflow:hidden;

}

/* Header */
#header {
  position:fixed; top:0; left:0; right:0; z-index:10;
  background:rgba(10,15,26,0.94); backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,208,255,0.12);
  padding:10px 24px; display:flex; align-items:center; justify-content:space-between;
}
#header h1 { font-size:17px; font-weight:700; }
#header h1 span {
  background:linear-gradient(90deg,#00D0FF,#A949DA);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header-right { display:flex; align-items:center; gap:16px; }
#search {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; padding:5px 12px; color:#fafafa; font-size:12px; width:180px; outline:none;
}
#search:focus { border-color:#00D0FF; }
#search::placeholder { color:#555; }
.stats { font-size:12px; color:#666; }
.stats b { color:#00D0FF; }

/* Tooltip */
#tooltip {
  position:fixed; z-index:20; pointer-events:none; opacity:0;
  background:rgba(10,15,26,0.97); border:1px solid rgba(0,208,255,0.25);
  border-radius:10px; padding:14px 18px; max-width:340px;
  box-shadow:0 12px 40px rgba(0,0,0,0.6); transition:opacity 0.12s;
}
#tooltip.visible { opacity:1; }
#tooltip .t-name { font-size:15px; font-weight:700; color:#00D0FF; }
#tooltip .t-stars { font-size:12px; color:#A949DA; margin-top:3px; }
#tooltip .t-cat { font-size:10px; color:#666; margin-top:2px; }
#tooltip .t-desc { font-size:11px; color:#bbb; margin-top:8px; line-height:1.55; }

/* Category labels */
.cluster-label {
  font-size:11px; font-weight:700; text-anchor:middle; letter-spacing:0.5px;
  paint-order:stroke; stroke:#0a0f1a; stroke-width:3px;
}
.cluster-ring { fill:none; stroke-width:1; opacity:0.08; }
.cluster-bg { opacity:0.03; }

/* Nodes */
.node-circle { cursor:pointer; transition:opacity 0.2s; }
.node-label { font-size:8px; fill:#667; pointer-events:none; text-anchor:middle; }
.link-line { stroke-opacity:0.06; stroke-width:0.8; }
.node-circle.dim { opacity:0.06; }
.node-label.dim { opacity:0.03; }
.link-line.dim { stroke-opacity:0.01; }
.node-circle.hi { stroke-width:2.5; filter:url(#glow); }

/* Instructions */
#hint {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  font-size:11px; color:#444; z-index:5;
}
</style>

  {id:"public-apis",n:"Public APIs",s:419000,c:"resources",d:"უფასო API-ების უზარმაზარი კატალოგი."},

  {id:"awesome-design",n:"Awesome DESIGN.md",s:17000,c:"resources",d:"55+ მზა დიზაინის შაბლონი AI-სთვის."},
  {id:"llm-wiki",n:"LLM Wiki",s:5000,c:"resources",d:"Karpathy: AI აშენებს პერსონალურ ცოდნის ბაზას."}
];

const links = [
  // coding ↔ coding
  {s:"claw-code",t:"opencode"},{s:"claw-code",t:"gemini-cli"},{s:"gemini-cli",t:"aider"},
  {s:"cline",t:"continue"},{s:"cline",t:"kilocode"},{s:"tabby",t:"continue"},{s:"goose",t:"claw-code"},
  // plugins → coding
  {s:"superpowers",t:"claw-code"},{s:"everything-cc",t:"claw-code"},{s:"oh-my-cc",t:"claw-code"},
  {s:"claude-mem",t:"claw-code"},{s:"gsd",t:"claw-code"},{s:"gsd",t:"gemini-cli"},
  {s:"codex-plugin",t:"claw-code"},{s:"graphify",t:"claw-code"},{s:"graphify",t:"gemini-cli"},
  {s:"ui-ux-pro",t:"claw-code"},{s:"cc-setup",t:"claw-code"},{s:"career-ops",t:"claw-code"},
  {s:"obsidian-skills",t:"claw-code"},{s:"n8n-skills",t:"n8n-mcp"},
  // mcp ecosystem
  {s:"mcp-servers",t:"context7"},{s:"mcp-servers",t:"github-mcp"},{s:"mcp-servers",t:"figma-mcp"},
  {s:"mcp-servers",t:"notion-mcp"},{s:"mcp-servers",t:"supabase-mcp"},{s:"mcp-servers",t:"drawio-mcp"},
  {s:"exa-mcp",t:"perplexity-mcp"},{s:"exa-mcp",t:"tavily-mcp"},{s:"perplexity-mcp",t:"tavily-mcp"},
  {s:"apify-mcp",t:"brightdata-mcp"},{s:"linkedin-mcp",t:"career-ops"},{s:"metricool-mcp",t:"linkedin-mcp"},
  // scraping
  {s:"browser-use",t:"playwright-mcp"},{s:"browser-use",t:"agent-browser"},
  {s:"playwright-mcp",t:"playwright-cli"},{s:"lightpanda",t:"playwright-mcp"},
  {s:"firecrawl-mcp",t:"brightdata-mcp"},{s:"firecrawl-mcp",t:"crawl4ai-rag"},
  {s:"agent-reach",t:"browser-use"},{s:"opencli",t:"browser-use"},
  // frameworks
  {s:"autogen",t:"semantic-kernel"},{s:"crewai",t:"langgraph"},{s:"crewai",t:"autogen"},
  {s:"langgraph",t:"llamaindex"},{s:"vercel-ai",t:"mastra"},{s:"mastra",t:"pydantic-ai"},
  {s:"hermes",t:"nanobot"},{s:"openspace",t:"hermes"},{s:"opensandbox",t:"openspace"},
  {s:"toon",t:"gsd"},
  // business
  {s:"langflow",t:"dify"},{s:"open-webui",t:"ollama"},{s:"openclaw",t:"browser-use"},
  {s:"perplexica",t:"ollama"},{s:"paperclip",t:"crewai"},{s:"dify",t:"ragflow"},
  // memory
  {s:"ragflow",t:"llamaindex"},{s:"lightrag",t:"rag-anything"},{s:"lightrag",t:"gitnexus"},
  {s:"mem0",t:"mempalace"},{s:"mem0",t:"hindsight"},{s:"mempalace",t:"claude-mem"},
  {s:"gitnexus",t:"graphify"},{s:"prism-mcp",t:"mem0"},
  // infra
  {s:"ollama",t:"llama-cpp"},{s:"vllm",t:"sglang"},{s:"coqui-tts",t:"realtimetts"},
  {s:"unsloth",t:"ollama"},{s:"comfyui",t:"hunyuanvideo"},{s:"gworkspace",t:"notebooklm-py"},
  // resources
  {s:"awesome-cc",t:"everything-cc"},{s:"awesome-cc",t:"superpowers"},{s:"awesome-cc",t:"oh-my-cc"},
  {s:"free-llm",t:"ollama"},{s:"claude-howto",t:"claw-code"},{s:"awesome-design",t:"ui-ux-pro"},
  {s:"llm-wiki",t:"mempalace"},{s:"public-apis",t:"apify-mcp"},{s:"autoresearch",t:"llm-wiki"}
].map(l => ({source:l.s, target:l.t}));

// ═══════════════════════════════════════════
//  CLUSTER POSITIONS (fixed zones)
// ═══════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const cx = W/2, cy = H/2;
const R = Math.min(W,H) * 0.34; // ring radius

// 9 categories arranged in a circle
const catKeys = Object.keys(cats);
const clusterPos = {};
catKeys.forEach((k, i) => {
  const angle = (i / catKeys.length) * Math.PI * 2 - Math.PI/2;
  clusterPos[k] = { x: cx + R * Math.cos(angle), y: cy + R * Math.sin(angle) };
});

// Assign initial positions near cluster center
nodes.forEach(nd => {
  const cp = clusterPos[nd.c];
  nd.x = cp.x + (Math.random()-0.5) * 80;
  nd.y = cp.y + (Math.random()-0.5) * 80;
});

// ═══════════════════════════════════════════
//  D3 RENDERING
// ═══════════════════════════════════════════
const svg = d3.select("#graph").attr("width",W).attr("height",H);
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.3,4]).on("zoom", e => g.attr("transform",e.transform)));

const rScale = d3.scaleSqrt().domain([0,d3.max(nodes,d=>d.s)]).range([3,36]);

// Cluster backgrounds
const clusterG = g.append("g");
catKeys.forEach(k => {
  const cp = clusterPos[k];
  const cat = cats[k];
  // Background circle
  clusterG.append("circle")
    .attr("class","cluster-bg").attr("cx",cp.x).attr("cy",cp.y)
    .attr("r", 120).attr("fill",cat.color);
  // Ring
  clusterG.append("circle")
    .attr("class","cluster-ring").attr("cx",cp.x).attr("cy",cp.y)
    .attr("r", 120).attr("stroke",cat.color);
  // Label
  clusterG.append("text")
    .attr("class","cluster-label").attr("x",cp.x).attr("y",cp.y - 130)
    .attr("fill",cat.color)
    .text(cat.icon + " " + cat.label);
});

// Links
const linkG = g.append("g").selectAll("line").data(links).join("line")
  .attr("class","link-line")
  .attr("stroke", d => {
    const sn = nodes.find(n=>n.id===d.source);
    return sn ? cats[sn.c].color : "#333";
  });

// Nodes
const nodeG = g.append("g").selectAll("g").data(nodes).join("g")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.15).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;})
  );

nodeG.append("circle").attr("class","node-circle")
  .attr("r", d=>rScale(d.s))
  .attr("fill", d=>cats[d.c].color).attr("fill-opacity",0.75)
  .attr("stroke", d=>cats[d.c].color).attr("stroke-opacity",0.4);

nodeG.append("text").attr("class","node-label")
  .attr("dy", d=>rScale(d.s)+10).text(d=>d.n);

// ═══════════════════════════════════════════
//  SIMULATION with cluster gravity
// ═══════════════════════════════════════════
function clusterForce(alpha) {
  nodes.forEach(d => {
    const cp = clusterPos[d.c];
    d.vx += (cp.x - d.x) * alpha * 0.12;
    d.vy += (cp.y - d.y) * alpha * 0.12;
  });
}

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(50).strength(0.15))
  .force("charge", d3.forceManyBody().strength(-60))
  .force("collision", d3.forceCollide().radius(d=>rScale(d.s)+3))
  .force("cluster", clusterForce)
  .on("tick", () => {
    linkG.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
         .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    nodeG.attr("transform",d=>`translate(${d.x},${d.y})`);
  });

// ═══════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════
const tooltip = d3.select("#tooltip");

function formatStars(s) {
  if(s>=1000) return (s/1000).toFixed(s>=10000?0:1)+"K";
  return s;
}

nodeG.on("mouseenter",(e,d)=>{
  tooltip.select(".t-name").text(d.n);
  tooltip.select(".t-stars").text("⭐ "+formatStars(d.s));
  tooltip.select(".t-cat").text(cats[d.c].icon+" "+cats[d.c].label);
  tooltip.select(".t-desc").text(d.d);
  tooltip.classed("visible",true);

  // Highlight connected
  const conn = new Set([d.id]);
  links.forEach(l=>{
    const si=typeof l.source==="object"?l.source.id:l.source;
    const ti=typeof l.target==="object"?l.target.id:l.target;
    if(si===d.id)conn.add(ti); if(ti===d.id)conn.add(si);
  });
  d3.selectAll(".node-circle").classed("dim",n=>!conn.has(n.id)).classed("hi",n=>n.id===d.id);
  d3.selectAll(".node-label").classed("dim",n=>!conn.has(n.id));
  linkG.classed("dim",l=>{
    const si=typeof l.source==="object"?l.source.id:l.source;
    const ti=typeof l.target==="object"?l.target.id:l.target;
    return si!==d.id&&ti!==d.id;
  }).filter(l=>{
    const si=typeof l.source==="object"?l.source.id:l.source;
    const ti=typeof l.target==="object"?l.target.id:l.target;
    return si===d.id||ti===d.id;
  }).attr("stroke-opacity",0.4);
}).on("mousemove",(e)=>{
  let x=e.clientX+16, y=e.clientY-10;
  if(x+350>W) x=e.clientX-360;
  if(y+200>H) y=e.clientY-200;
  tooltip.style("left",x+"px").style("top",y+"px");
}).on("mouseleave",()=>{
  tooltip.classed("visible",false);
  d3.selectAll(".node-circle").classed("dim",false).classed("hi",false);
  d3.selectAll(".node-label").classed("dim",false);
  linkG.classed("dim",false).attr("stroke-opacity",0.06);
});

// Category label click → filter
d3.selectAll(".cluster-label").style("cursor","pointer").on("click", function(){
  const txt = d3.select(this).text();
  const key = catKeys.find(k => txt.includes(cats[k].label));
  if(!key) return;
  const isActive = d3.select(this).classed("active-label");
  d3.selectAll(".cluster-label").classed("active-label",false);
  if(isActive){
    d3.selectAll(".node-circle").classed("dim",false);
    d3.selectAll(".node-label").classed("dim",false);
    linkG.classed("dim",false);
  } else {
    d3.select(this).classed("active-label",true);
    d3.selectAll(".node-circle").classed("dim",n=>n.c!==key);
    d3.selectAll(".node-label").classed("dim",n=>n.c!==key);
    linkG.classed("dim",true);
  }
});

// Search
d3.select("#search").on("input",function(){
  const q=this.value.toLowerCase();
  if(!q){
    d3.selectAll(".node-circle").classed("dim",false);
    d3.selectAll(".node-label").classed("dim",false);
    linkG.classed("dim",false); return;
  }
  d3.selectAll(".node-circle").classed("dim",n=>!n.n.toLowerCase().includes(q)&&!n.d.toLowerCase().includes(q));
  d3.selectAll(".node-label").classed("dim",n=>!n.n.toLowerCase().includes(q)&&!n.d.toLowerCase().includes(q));
  linkG.classed("dim",true);
});

// Resize
window.addEventListener("resize",()=>{
  const w=window.innerWidth, h=window.innerHeight;
  svg.attr("width",w).attr("height",h);
});
</script>
